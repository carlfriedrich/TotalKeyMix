# My configuration for FireFace UCX main volume
# Volume Up/Down/Mute keys
# Green volume bar in lower right screen corner on a 1440p display

config.ini

[Hotkeys]
VolumeUpHotkey=Volume_Up
VolumeDownHotkey=Volume_Down
VolumeMuteHotkey=Volume_Mute

[Midiport]
DeviceName=loopMIDI Port
MidiChannel=9
MidiCC=102

[Volume]
MaxValue=104
LastValue=36
VolumeStep=4

[Settings]
